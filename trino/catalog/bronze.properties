connector.name=delta_lake
hive.metastore=file
hive.metastore.catalog.dir=s3a://bronze/
hive.s3.endpoint=http://minio:9000
hive.s3.aws-access-key=${ENV:AWS_ACCESS_KEY_ID}
hive.s3.aws-secret-key=${ENV:AWS_SECRET_ACCESS_KEY}
